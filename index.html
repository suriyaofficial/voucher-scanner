<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dive Hrzn Voucher Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body{
      font-family: Arial, sans-serif;
      text-align:center;
      margin:20px;
    }

    #reader{
      width:350px;
      margin:auto;
    }

    #result{
      margin-top:20px;
      font-size:24px;
      font-weight:bold;
      color:green;
    }

    button{
      margin-top:20px;
      padding:10px 20px;
      font-size:16px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2>Dive Hrzn Voucher Scanner</h2>

<div id="reader"></div>

<div id="result">
  Waiting for scan...
</div>

<button onclick="startScanner()">
  Restart Scanner
</button>

<script>

let scanner;

function onScanSuccess(decodedText) {

  document.getElementById("result").innerHTML =
    "Voucher: " + decodedText;

  scanner.stop();

  // Future:
  // call Google Apps Script
  // check voucher
  // redeem voucher
}

function startScanner() {

  document.getElementById("result").innerHTML =
    "Waiting for scan...";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    {
      facingMode: "environment"
    },
    {
      fps: 10,
      qrbox: 250
    },
    onScanSuccess
  );
}

startScanner();

</script>

</body>
</html>
