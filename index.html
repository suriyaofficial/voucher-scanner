<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dive Hrzn Voucher Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
padding:20px;
text-align:center;
}

#reader{
width:350px;
margin:auto;
}

.card{
max-width:500px;
margin:20px auto;
padding:20px;
border:1px solid #ddd;
border-radius:10px;
display:none;
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}

.mode{
margin-bottom:20px;
}

</style>

</head>
<body>

<h2>Dive Hrzn Voucher Scanner</h2>

<div class="mode">

<label>
<input type="radio"
name="mode"
value="office"
checked>
Office Mode
</label>

<label style="margin-left:20px;">
<input type="radio"
name="mode"
value="mobile">
Mobile Mode
</label>

</div>
<div style="margin:20px;">

DH-

<input
type="text"
id="manualVoucher"
placeholder="SCB-65"
style="text-transform:uppercase;">

<button onclick="manualSearch()">
Search
</button>

</div>
<div id="reader"></div>

<div id="result">
Waiting for scan...
</div>

<div class="card" id="voucherCard">

<h3 id="customer"></h3>

<p>
Voucher:
<span id="voucher"></span>
</p>

<p>
Type:
<span id="type"></span>
</p>

<p>
Expiry:
<span id="expiry"></span>
</p>

<p>
Status:
<span id="status"></span>
</p>

<button id="redeemBtn"
onclick="redeemVoucher()">
REDEEM
</button>

<button id="renewBtn"
onclick="renewVoucher()">
RENEW
</button>

<button onclick="resetScanner()">
CLEAR
</button>

</div>

<button onclick="resetScanner()">
Restart Scanner
</button>

<script>

let scanner;
let currentVoucher="";

const OFFICE_URL =
"https://script.google.com/macros/s/AKfycbzk36B1xp3K6RzlxrhyLuGc_N-m7se3nwhnck5sH67NykMYjRzEdL-LIEmep3cpNDFsSA/exec";

const MOBILE_URL =
"https://script.google.com/macros/s/AKfycbwmH87DzIWMQXvsxhvOk_M3vu-wq20cGx-l7szvi66XIWlyOEjGv-D61jxTja5kCGK6/exec";

function onScanSuccess(decodedText){

currentVoucher =
extractVoucherCode(decodedText);

const mode =
document.querySelector(
'input[name="mode"]:checked'
).value;

if(mode==="office"){

document.getElementById("result")
.innerHTML=
"Sending to dashboard : "
+ currentVoucher;

fetch(
OFFICE_URL +
"?voucher=" +
encodeURIComponent(currentVoucher),
{
method:"GET",
mode:"no-cors"
}
);

scanner.stop();

return;
}

/* MOBILE MODE */

loadVoucher(currentVoucher);

}




function extractVoucherCode(text){

  const match =
  text.match(/DH-[A-Z]+-\d+/);

  if(match){
    return match[0];
  }

  return text;
}
async function loadVoucher(voucherId){


const res =
await fetch(
MOBILE_URL +
"?action=check&voucher=" +
encodeURIComponent(voucherId),
{
  method:"GET",
  mode:"cors"
}
);

const data =
await res.json();

if(!data.success){

alert("Voucher not found");
return;
}

document.getElementById("voucherCard")
.style.display="block";

document.getElementById("customer")
.innerText=data.customer;

document.getElementById("voucher")
.innerText=data.voucher;

document.getElementById("type")
.innerText=data.type;

document.getElementById("expiry")
.innerText=data.expiry;

document.getElementById("status")
.innerText=data.status;

document.getElementById("redeemBtn")
.style.display=
data.status==="VALID"
? "inline-block"
: "none";

document.getElementById("renewBtn")
.style.display=
data.status==="EXPIRED"
? "inline-block"
: "none";

scanner.stop();

}

async function redeemVoucher(){

await fetch(
MOBILE_URL +
"?action=redeem&voucher=" +
encodeURIComponent(currentVoucher)
);

alert("Voucher Redeemed");

resetScanner();

}

async function renewVoucher(){

await fetch(
MOBILE_URL +
"?action=renew&voucher=" +
encodeURIComponent(currentVoucher)
);

alert("Voucher Renewed");

resetScanner();

}

function resetScanner(){

document.getElementById("voucherCard")
.style.display="none";

document.getElementById("result")
.innerHTML=
"Waiting for scan...";

startScanner();

}

function startScanner(){

if(scanner){

try{
scanner.stop();
}catch(e){}

try{
scanner.clear();
}catch(e){}
}

scanner=
new Html5Qrcode("reader");

scanner.start(
{
facingMode:"environment"
},
{
fps:10,
qrbox:250
},
onScanSuccess
);

}
  function manualSearch(){

  const value =
document.getElementById(
"manualVoucher"
).value.trim().toUpperCase();

  if(!value){
    return;
  }

  currentVoucher =
  "DH-" + value;

  const mode =
  document.querySelector(
  'input[name="mode"]:checked'
  ).value;

  if(mode==="office"){

    fetch(
      OFFICE_URL +
      "?voucher=" +
      encodeURIComponent(currentVoucher),
      {
        method:"GET",
        mode:"no-cors"
      }
    );

    alert(
      "Sent : " +
      currentVoucher
    );

    return;
  }

  loadVoucher(currentVoucher);

}
  document
.getElementById("manualVoucher")
.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){
manualSearch();
}

});

startScanner();

</script>

</body>
</html>
